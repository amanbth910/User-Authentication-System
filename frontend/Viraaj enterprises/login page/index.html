<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="login-container">

        <div class="login-box">

            <h2>Login</h2>

            <form id="loginForm">

                <div class="input-box">
                    <input type="email" id="email" required>
                    <label>Email</label>
                </div>


                <div class="input-box">
                    <input type="password" id="password" required>
                    <label>Password</label>
                </div>


                <div class="options">

                    <label>
                        <input type="checkbox">
                        Remember me
                    </label>

                    <a href="../forgotpage/forgot.html">Forgot Password?</a>

                </div>


                <button type="submit">
                    Login
                </button>


                <p class="signup">
                    Don't have an account?
                    <a href="../signuppage/signup.html">Sign Up</a>
                </p>


            </form>

        </div>

    </div>
    <script src="login.js"></script>


</body>
</html>
